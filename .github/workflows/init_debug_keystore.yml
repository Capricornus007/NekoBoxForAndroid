name: Initialize Debug Keystore
on:
  workflow_dispatch:

jobs:
  init-keystore:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT || github.token }}

      - name: Generate Keystore
        run: |
          KEYSTORE_PATH="debug.keystore"
          if [ -f "$KEYSTORE_PATH" ]; then
            echo "Keystore already exists at $KEYSTORE_PATH. Skipping generation."
          else
            echo "Generating debug.keystore..."
            keytool -genkey -v \
              -keystore "$KEYSTORE_PATH" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "Keystore generated successfully."
          fi

      - name: Commit and Push
        run: |
          KEYSTORE_PATH="debug.keystore"
          if [ -f "$KEYSTORE_PATH" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            # Check if there are changes to commit
            if git status --porcelain | grep -q "$KEYSTORE_PATH"; then
              git add "$KEYSTORE_PATH"
              git commit -m "chore: initialize fixed debug.keystore for preview builds"
              git push
              echo "Keystore committed and pushed successfully."
            else
              echo "No changes to commit."
            fi
          else
            echo "Error: Keystore file not found!"
            exit 1
          fi
